apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-web
  labels:
    app: relay-web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: relay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: relay-web
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app: relay-web
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: relay
    spec:
      containers:
        - name: web
          image: relay-web:local
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: relay-web
  labels:
    app.kubernetes.io/name: web
spec:
  selector:
    app: relay-web
  ports:
    - port: 80
      targetPort: 80
