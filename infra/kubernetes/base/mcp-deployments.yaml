apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-mcp-domain
  labels:
    app.kubernetes.io/name: mcp-domain
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-domain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-domain
        app.kubernetes.io/component: mcp
        app.kubernetes.io/part-of: relay
    spec:
      containers:
        - name: mcp-domain
          image: relay-mcp-domain:local
          ports:
            - containerPort: 8090
          envFrom:
            - secretRef:
                name: relay-app-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: relay-mcp-domain
  labels:
    app.kubernetes.io/name: mcp-domain
    app.kubernetes.io/component: mcp
spec:
  selector:
    app.kubernetes.io/name: mcp-domain
  ports:
    - port: 8090
      targetPort: 8090
---
