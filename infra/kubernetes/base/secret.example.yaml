# Copy to secret.yaml (gitignored) or create via:
# kubectl -n relay-ops create secret generic relay-app-secrets --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: relay-app-secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql://relay:CHANGE_ME_MIN_32_CHARS_XXXXXXXX@postgres:5432/relay_ops
  REDIS_URL: redis://:CHANGE_ME_MIN_32_CHARS_XXXXXXXX@redis:6379/0
  CELERY_BROKER_URL: redis://:CHANGE_ME_MIN_32_CHARS_XXXXXXXX@redis:6379/1
  KEYCLOAK_URL: http://keycloak:8080
  KEYCLOAK_ISSUER: https://auth.relay.local
  KEYCLOAK_REALM: acme
  OPENAI_API_KEY: ""
  LANGFUSE_PUBLIC_KEY: pk-lf-relay-local-public
  LANGFUSE_SECRET_KEY: sk-lf-relay-local-secret
  LANGFUSE_HOST: http://langfuse:3000
  ENABLE_LANGFUSE: "true"
  ENABLE_MCP_AGENT_TOOLS: "true"
  MCP_DOMAIN_URL: http://relay-mcp-domain:8090
  MCP_FILESYSTEM_URL: http://relay-mcp-filesystem:8091
  MCP_POSTGRES_URL: http://relay-mcp-postgres:8092
  MCP_CONNECT_TIMEOUT_SECONDS: "10"
  MCP_SSE_READ_TIMEOUT_SECONDS: "120"
  CORS_ORIGINS: https://app.relay.local
  FRONTEND_URL: https://app.relay.local
