apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-worker
  labels:
    app: relay-worker
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: relay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: relay-worker
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app: relay-worker
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: relay
    spec:
      containers:
        - name: worker
          image: relay-worker:local
          envFrom:
            - secretRef:
                name: relay-app-secrets
