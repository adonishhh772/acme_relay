apiVersion: v1
kind: ConfigMap
metadata:
  name: relay-ingress-config
  labels:
    app.kubernetes.io/name: relay
    app.kubernetes.io/component: ingress
data:
  FRONTEND_URL: https://app.relay.local
  API_URL: https://api.relay.local
  KEYCLOAK_ISSUER: https://auth.relay.local
  CORS_ORIGINS: https://app.relay.local
  LANGFUSE_UI_URL: https://langfuse.relay.local
  GRAFANA_UI_URL: https://grafana.relay.local
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relay-ingress
  labels:
    app.kubernetes.io/name: relay
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.relay.local
        - api.relay.local
      secretName: relay-tls
  rules:
    - host: app.relay.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: relay-web
                port:
                  number: 80
    - host: api.relay.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: relay-api
                port:
                  number: 8000
