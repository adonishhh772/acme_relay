server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }

  location /health {
    proxy_pass http://api:8000/health;
  }

  location / {
    try_files $uri /index.html;
  }
}
